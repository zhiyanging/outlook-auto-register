allow-lan: false
client-fingerprint: chrome
dns:
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  - 8.8.8.8
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  ipv6: false
  listen: 127.0.0.1:53553
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
external-controller: 127.0.0.1:29090
find-process-mode: 'off'
ipv6: false
log-level: info
mixed-port: 28888
mode: rule
proxies:
- name: WARP-SOCKS5
  port: 1080
  server: 127.0.0.1
  type: socks5
proxy-groups:
- name: AUTO
  proxies:
  - WARP-SOCKS5
  type: select
rules:
- MATCH,AUTO
skip-auth: true
tcp-concurrent: true
unified-delay: true
